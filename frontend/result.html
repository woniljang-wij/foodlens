class="absolute top-3 right-3 text-gray-500 hover:text-black">

✖

</button>

<h2 id="popupTitle" class="text-2xl font-bold mb-4"></h2>

<div id="popupContent" class="text-gray-600"></div>

</div>

<!-- Zoom Image -->

<div id="imageZoom"
class="fixed inset-0 bg-black bg-opacity-80 hidden flex items-center justify-center">

<img src="images/pho.jpg"
class="w-1/2 rounded-xl shadow-lg">

<button onclick="closeZoom()"
class="absolute top-10 right-10 text-white text-3xl">

✖

</button>

</div>



<script src="js/main.js"></script>


<script>

// ===== AI Confidence Animation =====

let percent = 92

let bar = document.getElementById("confidenceBar")
let text = document.getElementById("confidenceText")

let i = 0

let interval = setInterval(()=>{

if(i>=percent){

clearInterval(interval)

}

bar.style.width = i + "%"

text.innerText = i + "%"

i++

},20)



// ===== Zoom Image =====

function zoomImage(){

document.getElementById("imageZoom").classList.remove("hidden")

}

function closeZoom(){

document.getElementById("imageZoom").classList.add("hidden")

}

</script>


</body>

</html>
