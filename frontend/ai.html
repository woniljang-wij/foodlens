<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>FoodLens AI</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="ai-page">
    <!-- Navbar -->

    <nav class="bg-white shadow-sm">
      <div
        class="container mx-auto px-6 py-4 flex justify-between items-center"
      >
        <h1 class="text-2xl font-bold text-green-600 logo-ai">🍜 FoodLens</h1>
      </div>
    </nav>
    <!-- Hero -->

    <section class="text-center mt-16">
      <h1 class="text-5xl font-bold text-white mb-4 drop-shadow-lg">AI nhận diện món ăn 🍜</h1>

      <p class="text-white text-lg drop-shadow-md">
        Upload ảnh để phân tích món ăn, nguyên liệu, quy trình chế biến và dinh
        dưỡng
      </p>
    </section>

    <!-- Upload Card -->

    <div class="flex justify-center mt-12">
      <div
        class="upload-card bg-white shadow-xl rounded-2xl p-10 w-[400px] text-center"
      >
        <div id="drop-area" class="upload-box">
          <input type="file" id="imageInput" class="hidden" />

          <div id="uploadText" class="upload-placeholder">
            <div class="text-5xl mb-2">📷</div>
            <p class="text-gray-500">
              Kéo ảnh vào đây hoặc
              <span class="text-green-600 font-semibold">chọn ảnh</span>
            </p>
          </div>

          <img id="preview" class="preview-img hidden" />

          <div id="scanLine" class="scan-line hidden"></div>
        </div>

        <button
          onclick="uploadImage()"
          id="aiButton"
          class="ai-btn mt-6 w-full bg-green-600 hover:bg-green-700 py-3 rounded-lg text-lg"
        >
          <span id="aiText" class="ai-text">🔍 Bắt đầu nhận diện</span>
        </button>

        <div id="loading" class="hidden mt-6">
          <div class="flex flex-col items-center">
            <div
              class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-600"
            ></div>

            <p class="mt-3 text-gray-500">AI đang phân tích món ăn...</p>
          </div>
        </div>
      </div>
    </div>
    <script src="js/main.js"></script>
  </body>
</html>
